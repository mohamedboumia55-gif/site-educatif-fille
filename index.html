<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'école magique</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="hud">
    <div class="hud-top">
      <div class="hud-title">🎓 L'école magique</div>
      <div class="hud-stats">
        <span class="stat-chip">🔥 <span id="hud-streak">0</span></span>
        <span class="stat-chip">⭐ <span id="hud-xp">0</span> XP</span>
        <span class="stat-chip" id="hud-hearts">❤️❤️❤️❤️❤️</span>
        <button class="btn-logout" onclick="Profiles.logout()" title="Changer">🔄</button>
      </div>
    </div>
    <div class="xp-row">
      <span id="user-name-display" style="font-weight:700;color:rgba(255,255,255,0.7);">—</span>
      <span>Niveau <span id="hud-level">1</span></span>
    </div>
    <div class="xp-track"><div class="xp-fill" id="hud-xp-bar"></div></div>
  </header>

  <main>
    <div class="hero">
      <h2>Bonjour <span id="prenom-hero">!</span></h2>
      <p>Choisis une matière pour commencer ✨</p>
    </div>

    <div class="teacher-zone">
      <div id="teacher-avatar" class="avatar-idle">
        <div class="teacher-frame">
          <div class="teacher-ring"></div>
          <div class="teacher-emoji">👩‍🏫</div>
          <div class="teacher-name-badge">Mme Sophie</div>
        </div>
      </div>
      <div class="speech-bubble" id="teacher-bubble">
        Choisis une matière et on commence !
      </div>
      <button id="btn-micro" onclick="activerMicro()">🎤 Parler</button>
    </div>

    <div class="subject-grid">
      <a href="pages/lecture.html" class="subject-card s-lecture">
        <span class="s-emoji">📖</span>
        <span class="s-label">Lecture</span>
        <span class="s-sub">Textes &amp; questions</span>
      </a>
      <a href="pages/grammaire.html" class="subject-card s-grammaire">
        <span class="s-emoji">✏️</span>
        <span class="s-label">Grammaire</span>
        <span class="s-sub">Nature des mots</span>
      </a>
      <a href="pages/conjugaison.html" class="subject-card s-conjugaison">
        <span class="s-emoji">🔤</span>
        <span class="s-label">Conjugaison</span>
        <span class="s-sub">Présent, passé, futur</span>
      </a>
      <a href="pages/orthographe.html" class="subject-card s-ortho">
        <span class="s-emoji">🔡</span>
        <span class="s-label">Orthographe</span>
        <span class="s-sub">Dictée &amp; vocabulaire</span>
      </a>
    </div>
  </main>

  <script src="js/teacher.js"></script>
  <script src="js/profiles.js"></script>
  <script>
    window.addEventListener('load', () => {
      Teacher.init();
      initProfileSystem((name) => {
        document.getElementById('prenom-hero').textContent = name + ' !';
        setTimeout(() => {
          Teacher.encourager("Bonjour " + name + " ! Je suis Madame Sophie, ta professeure. Clique sur une matière pour commencer !");
        }, 600);
      });
    });

    function activerMicro() {
      if (Teacher.isListening) { Teacher.arreterEcoute(); return; }
      Teacher.parler("Je t'écoute !", () => {
        Teacher.ecouter(t => Teacher.parler("Tu as dit : " + t + ". Choisis une matière !"));
      });
    }
  </script>
</body>
</html>
