<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammaire – L'école magique</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header>
    <a href="../index.html" style="color:white;font-size:1.5rem;text-decoration:none;">←</a>
    <span style="font-size:2rem;">✏️</span>
    <h1>Grammaire</h1>
    <div class="header-stars" style="display:flex;align-items:center;gap:10px;">
      <span style="color:white;font-size:0.85rem;font-weight:700;" id="user-name-display"></span>
      <span class="score-badge">⭐ <span id="score-total">0</span></span>
      <button onclick="Profiles.logout()" title="Changer d'utilisateur"
        style="background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;">🔄</button>
    </div>
  </header>

  <main>
    <div class="teacher-zone">
      <div id="teacher-avatar">🦉</div>
      <div class="bubble" id="teacher-bubble">En grammaire, on apprend la nature des mots. Prête ? C'est parti !</div>
      <button id="btn-micro" onclick="activerMicro()">🎤 Parler</button>
    </div>

    <div class="exercice-zone">
      <div class="exercice-card">
        <h2 id="exercice-titre">📝 Quelle est la nature de ce mot ?</h2>
        <p id="lecon" style="background:#f5f0ff;border-radius:12px;padding:12px;margin-bottom:14px;font-size:0.95rem;line-height:1.6;color:#555;"></p>
        <p style="font-size:1.3rem;font-weight:800;text-align:center;margin:14px 0;color:#333;">
          Le mot : <span id="mot-cible" style="color:#c44dff;font-size:1.6rem;"></span>
        </p>
        <p style="text-align:center;color:#666;font-style:italic;margin-bottom:10px;" id="phrase-contexte"></p>
        <div class="choix-grid" id="choix-container"></div>
        <div class="feedback" id="feedback-gram"></div>
      </div>

      <div style="text-align:center;margin-top:8px;">
        <button class="valider-btn" onclick="prochainExercice()" id="btn-suivant" style="display:none;background:#0060c0;">
          Question suivante ➜
        </button>
      </div>
    </div>
  </main>

  <script src="../js/teacher.js"></script>
  <script src="../js/profiles.js"></script>
  <script>
    const exercices = [
      {
        mot: "chien", phrase: "Le chien court dans le jardin.", bonne: "Nom commun",
        choix: ["Nom commun", "Verbe", "Adjectif", "Article"],
        lecon: "Un nom commun désigne une chose, un animal ou une personne de façon générale. Exemples : chat, maison, enfant."
      },
      {
        mot: "court", phrase: "Le chien court dans le jardin.", bonne: "Verbe",
        choix: ["Nom commun", "Verbe", "Adjectif", "Préposition"],
        lecon: "Un verbe exprime une action ou un état. Exemples : manger, dormir, être, avoir."
      },
      {
        mot: "Le", phrase: "Le chien court dans le jardin.", bonne: "Article",
        choix: ["Adjectif", "Verbe", "Article", "Nom commun"],
        lecon: "Un article précède un nom. Exemples : le, la, les, un, une, des."
      },
      {
        mot: "petit", phrase: "Un petit chat dort sur le canapé.", bonne: "Adjectif",
        choix: ["Nom commun", "Verbe", "Adjectif", "Adverbe"],
        lecon: "Un adjectif qualificatif donne une information sur un nom. Exemples : grand, beau, rouge, gentil."
      },
      {
        mot: "dans", phrase: "Le chien court dans le jardin.", bonne: "Préposition",
        choix: ["Article", "Verbe", "Adjectif", "Préposition"],
        lecon: "Une préposition relie des mots entre eux. Exemples : dans, sur, sous, avec, pour, à, de."
      }
    ];

    let index = 0;

    window.addEventListener('load', () => {
      Teacher.init();
      initProfileSystem((name) => {
        setTimeout(() => {
          Teacher.parler("Bienvenue en grammaire " + name + " ! Nous allons identifier la nature des mots. Prête ? C'est parti !");
          afficherExercice(0);
        }, 600);
      });
    });

    function afficherExercice(i) {
      if (i >= exercices.length) {
        document.querySelector('.exercice-card').innerHTML = '<h2>🎉 Bravo ! Tu as terminé tous les exercices de grammaire !</h2>';
        Profiles.saveProgression('grammaire', { termine: true, date: new Date().toLocaleDateString() });
        Teacher.parler("Félicitations ! Tu as terminé tous les exercices de grammaire. Tu es vraiment très forte !");
        return;
      }
      const ex = exercices[i];
      document.getElementById('mot-cible').textContent = ex.mot;
      document.getElementById('phrase-contexte').textContent = '"' + ex.phrase + '"';
      document.getElementById('lecon').textContent = '💡 ' + ex.lecon;
      document.getElementById('feedback-gram').className = 'feedback';
      document.getElementById('btn-suivant').style.display = 'none';

      let html = '';
      ex.choix.forEach(c => {
        html += `<button class="choix-btn" onclick="verifier('${c}', '${ex.bonne}', this)">${c}</button>`;
      });
      document.getElementById('choix-container').innerHTML = html;
      Teacher.parler("Écoute bien la phrase : " + ex.phrase + ". Quelle est la nature du mot : " + ex.mot + " ?");
    }

    function verifier(reponse, bonne, btn) {
      const btns = document.querySelectorAll('.choix-btn');
      btns.forEach(b => b.disabled = true);
      const feedback = document.getElementById('feedback-gram');

      if (reponse === bonne) {
        btn.classList.add('correct');
        feedback.textContent = '✅ Excellent ! ' + bonne + ', c\'est juste !';
        feedback.className = 'feedback bravo';
        const newScore = Profiles.addPoint();
        document.getElementById('score-total').textContent = newScore;
        Teacher.parler("Excellent ! " + bonne + ", c'est la bonne réponse. Bravo !");
      } else {
        btn.classList.add('incorrect');
        btns[Array.from(btns).findIndex(b => b.textContent === bonne)].classList.add('correct');
        feedback.textContent = '❌ Pas tout à fait. C\'est un ' + bonne;
        feedback.className = 'feedback erreur';
        Teacher.parler("Pas tout à fait. Ce mot est un " + bonne + ". Retiens bien !");
      }
      document.getElementById('btn-suivant').style.display = 'inline-block';
    }

    function prochainExercice() { index++; afficherExercice(index); }

    function activerMicro() {
      if (Teacher.isListening) { Teacher.arreterEcoute(); return; }
      Teacher.parler("Je t'écoute !", () => {
        Teacher.ecouter((t) => {
          document.getElementById('teacher-bubble').textContent = "Tu as dit : \"" + t + "\"";
        });
      });
    }
  </script>
</body>
</html>
