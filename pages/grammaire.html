<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammaire – L'école magique</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="hud">
    <div class="hud-top">
      <a href="../index.html" class="hud-back">←</a>
      <div class="hud-title">✏️ Grammaire</div>
      <div class="hud-stats">
        <span class="stat-pill">🔥 <span id="hud-streak">0</span></span>
        <span class="stat-pill">⭐ <span id="hud-xp">0</span> XP</span>
        <span class="stat-pill" id="hud-hearts">❤️❤️❤️❤️❤️</span>
        <button class="btn-logout" onclick="Profiles.logout()">🔄</button>
      </div>
    </div>
    <div class="xp-label">
      <span id="user-name-display"></span>
      <span>Niv. <span id="hud-level">1</span></span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="hud-xp-bar"></div></div>
  </header>

  <main>
    <div class="teacher-zone">
      <div id="teacher-avatar" class="avatar-idle">🦉</div>
      <div class="speech-bubble" id="teacher-bubble">On va identifier la nature des mots. Prête ?</div>
      <button id="btn-micro" onclick="activerMicro()">🎤 Parler</button>
    </div>

    <div class="exercice-zone">
      <div class="exercice-card">
        <h2 id="exercice-titre">📝 Quelle est la nature de ce mot ?</h2>
        <div class="lecon-box" id="lecon"></div>
        <div class="mot-cible" id="mot-cible"></div>
        <p style="text-align:center;color:#6b7280;font-style:italic;font-size:0.9rem;margin-bottom:4px;" id="phrase-contexte"></p>
        <div class="choix-grid" id="choix-container"></div>
        <div class="feedback" id="feedback-gram"></div>
      </div>

      <div style="text-align:center;">
        <button class="valider-btn blue" onclick="prochainExercice()" id="btn-suivant" style="display:none;">
          Question suivante ➜
        </button>
      </div>
    </div>
  </main>

  <script src="../js/teacher.js"></script>
  <script src="../js/profiles.js"></script>
  <script>
    const exercices = [
      { mot:"chien", phrase:"Le chien court dans le jardin.", bonne:"Nom commun",
        choix:["Nom commun","Verbe","Adjectif","Article"],
        lecon:"Un nom commun désigne une chose, un animal ou une personne. Ex : chat, maison, enfant." },
      { mot:"court", phrase:"Le chien court dans le jardin.", bonne:"Verbe",
        choix:["Nom commun","Verbe","Adjectif","Préposition"],
        lecon:"Un verbe exprime une action ou un état. Ex : manger, dormir, être, avoir." },
      { mot:"Le", phrase:"Le chien court dans le jardin.", bonne:"Article",
        choix:["Adjectif","Verbe","Article","Nom commun"],
        lecon:"Un article précède un nom. Ex : le, la, les, un, une, des." },
      { mot:"petit", phrase:"Un petit chat dort sur le canapé.", bonne:"Adjectif",
        choix:["Nom commun","Verbe","Adjectif","Adverbe"],
        lecon:"Un adjectif qualificatif donne une information sur un nom. Ex : grand, beau, rouge." },
      { mot:"dans", phrase:"Le chien court dans le jardin.", bonne:"Préposition",
        choix:["Article","Verbe","Adjectif","Préposition"],
        lecon:"Une préposition relie des mots. Ex : dans, sur, sous, avec, pour, à, de." }
    ];

    let index = 0;

    window.addEventListener('load', () => {
      Teacher.init();
      initProfileSystem((name) => {
        setTimeout(() => {
          Teacher.encourager("Bienvenue en grammaire " + name + " ! On va identifier la nature des mots. C'est parti !");
          afficherExercice(0);
        }, 700);
      });
    });

    function afficherExercice(i) {
      if (i >= exercices.length) {
        document.querySelector('.exercice-card').innerHTML = '<h2 style="text-align:center;color:#7c3aed">🎉 Bravo ! Tu as terminé la grammaire !</h2>';
        Profiles.saveProgression('grammaire', { termine: true, date: new Date().toLocaleDateString() });
        Teacher.encourager("Félicitations ! Tu as terminé tous les exercices de grammaire. Tu es vraiment très forte !");
        return;
      }
      const ex = exercices[i];
      document.getElementById('mot-cible').textContent = ex.mot;
      document.getElementById('phrase-contexte').textContent = '"' + ex.phrase + '"';
      document.getElementById('lecon').textContent = '💡 ' + ex.lecon;
      document.getElementById('feedback-gram').className = 'feedback';
      document.getElementById('btn-suivant').style.display = 'none';

      let html = '';
      ex.choix.forEach(c => {
        html += `<button class="choix-btn" onclick="verifier('${c}','${ex.bonne}',this)">${c}</button>`;
      });
      document.getElementById('choix-container').innerHTML = html;
      Teacher.poserQuestion("Quelle est la nature du mot : " + ex.mot + " ?");
    }

    function verifier(reponse, bonne, btn) {
      document.querySelectorAll('.choix-btn').forEach(b => b.disabled = true);
      const fb = document.getElementById('feedback-gram');

      if (reponse === bonne) {
        btn.classList.add('correct');
        fb.textContent = '✅ Excellent ! "' + bonne + '", c\'est juste !';
        fb.className = 'feedback bravo';
        SFX.correct();
        lancerConfettis();
        document.getElementById('teacher-avatar').className = 'avatar-celebrate';
        setTimeout(() => document.getElementById('teacher-avatar').className = 'avatar-idle', 600);
        const levelUp = Profiles.addXP(10);
        updateHUD();
        if (levelUp) { SFX.levelUp(); afficherToastNiveau(); }
        Teacher.encourager("Excellent ! " + bonne + ", c'est la bonne réponse. Bravo !");
      } else {
        btn.classList.add('incorrect');
        document.querySelectorAll('.choix-btn')[exercices[index].choix.indexOf(bonne)].classList.add('correct');
        fb.textContent = '❌ Pas tout à fait. C\'est un ' + bonne;
        fb.className = 'feedback erreur';
        SFX.incorrect();
        Profiles.loseHeart();
        updateHUD();
        Teacher.consoler("Pas tout à fait. Ce mot est un " + bonne + ". Retiens bien !");
      }
      document.getElementById('btn-suivant').style.display = 'inline-block';
    }

    function prochainExercice() { index++; afficherExercice(index); }

    function afficherToastNiveau() {
      const t = document.createElement('div');
      t.className = 'level-up-toast';
      t.textContent = '🎉 Niveau ' + Profiles.getLevel() + ' atteint !';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

    function activerMicro() {
      if (Teacher.isListening) { Teacher.arreterEcoute(); return; }
      Teacher.parler("Je t'écoute !", () => {
        Teacher.ecouter(t => document.getElementById('teacher-bubble').textContent = "Tu as dit : \"" + t + "\"");
      });
    }
  </script>
</body>
</html>
